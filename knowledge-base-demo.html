    function curveSvg(points,duration,color){const coords=points.map(p=>`${45+p.t/duration*820},${190-p.v*1.45}`).join(' ');return `<svg class="curve-chart" viewBox="0 0 920 230" role="img" aria-label="曲线图"><path d="M45 20V190H885" fill="none" stroke="#9FA5A9"/><path d="M45 147.5H885M45 103.5H885M45 59.5H885" fill="none" stroke="#E1E4E5"/><polyline points="${coords}" fill="none" stroke="${color}" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>${points.map(p=>{const x=45+p.t/duration*820,y=190-p.v*1.45;return `<circle cx="${x}" cy="${y}" r="5" fill="#fff" stroke="${color}" stroke-width="3"/><text x="${Math.min(x+7,820)}" y="${Math.max(y-9,18)}" font-size="11" fill="#4B5359">${p.t}s ${p.label}</text>`}).join('')}<text x="10" y="28" font-size="11" fill="#687078">高</text><text x="10" y="188" font-size="11" fill="#687078">低</text><text x="840" y="216" font-size="11" fill="#687078">时间轴</text></svg>`}
    function scoreWithDelta(value,previous){const n=Number(value),delta=previous===null?null:n-Number(previous),trendClass=delta===null?'trend baseline':delta>0?'trend up':delta<0?'trend down':'trend flat',label=delta===null?'基准':delta>0?`↑ +${delta}`:delta<0?`↓ −${Math.abs(delta)}`:'→ 0';return `<span class="score-with-delta"><span class="tag ${n>80?'red':'outline'}">${n}</span><small class="${trendClass}">${label}</small></span>`}
    function renderCharacters(v,a){const cards=`<div class="character-grid">${v.characters.map(c=>`<article class="character-card"><img class="avatar" src="${media[c.image]}" alt="${c.name}"><div><div><b>${c.name}</b> <span class="tag ${c.manual?'good':'outline'}">${c.type}</span></div><p class="small muted">${c.attribute}</p>${c.manual?'<span class="status ready">已人工标记</span>':'<span class="status pending">AI 识别</span>'}</div><button class="btn icon-only" data-action="edit-character" data-id="${c.id}" title="人工标记角色">${icon('edit')}</button></article>`).join('')}</div>`,table=`<div class="panel table-wrap"><table class="table character-table"><thead><tr><th>角色</th><th>角色类型</th><th>角色属性</th><th>识别状态</th><th>操作</th></tr></thead><tbody>${v.characters.map(c=>`<tr><td><div class="character-cell"><img class="avatar" src="${media[c.image]}" alt="${c.name}"><b>${c.name}</b></div></td><td><span class="tag outline">${c.type}</span></td><td>${c.attribute}</td><td>${c.manual?'<span class="status ready">已人工标记</span>':'<span class="status pending">AI 识别</span>'}</td><td><button class="btn" data-action="edit-character" data-id="${c.id}">${icon('edit')} 人工标记</button></td></tr>`).join('')}</tbody></table></div>`;return `<section style="margin-top:12px"><div class="page-head" style="margin-bottom:10px"><div><h2 style="margin:0">角色列表</h2><p class="page-sub">AI 识别结果可由人工标记修正，保存后立即更新。</p></div><div class="page-actions"><div class="segmented"><button class="segment ${a.characterView==='cards'?'active':''}" data-action="set-character-view" data-value="cards">${icon('grid')} 卡片展示</button><button class="segment ${a.characterView==='table'?'active':''}" data-action="set-character-view" data-value="table">${icon('list')} 表格展示</button></div></div></div>${a.characterView==='table'?table:cards}</section>`}
    function renderAnalysis(){const a=state.analysis,v=selectedAnalysisVideo(),tabs=[['overview','概览'],['settings','设定与角色'],['curves','世界线与情绪分析'],['storyboard','分镜时序'],['rules','规则审核']];let content='';if(a.activeTab==='overview')content=`<div class="grid-2"><section class="panel"><div class="panel-head"><h2>内容梗概</h2><span class="panel-note">${v.duration} 秒</span></div><div class="panel-body analysis-summary"><img class="analysis-poster" src="${media[v.poster]}" alt="${v.title}海报"><div><h2>${v.title}</h2><div class="tag-editor"><span class="tag red">${v.genre}</span><span class="tag outline">${v.source}</span></div><p style="line-height:1.8">${v.summary}</p><div class="topic-card"><b>本集核心命题</b><p>当技术与流程掩盖创作者贡献时，成年人如何用证据重新取得解释权。</p></div></div></div></section><aside class="panel"><div class="panel-head"><h2>快速判断</h2></div><div class="panel-body">${metric('钩子有效性','强','0–3 秒直接亮出关键证据','red')}${metric('节奏密度','中高','96 秒内完成 3 次权力转换','yellow')}${metric('可复用规则',v.rules.length,'其中 '+v.rules.filter(r=>r.status==='approved').length+' 条已确认','good')}</div></aside></div>`;else if(a.activeTab==='settings')content=`<div class="grid-even"><section class="panel"><div class="panel-head"><h2>世界观设定</h2></div><div class="panel-body"><p style="line-height:1.8">${v.worldview}</p></div></section><section class="panel"><div class="panel-head"><h2>阵营设定</h2></div><div class="panel-body">${v.factions.map(f=>`<div class="comment"><b>${f.name}</b><div class="small muted">目标：${f.goal}</div><div class="small">成员：${f.members}</div></div>`).join('')}</div></section></div>${renderCharacters(v,a)}`;else if(a.activeTab==='curves')content=`<div class="curve-grid"><section class="panel"><div class="panel-head"><h2>世界线剧情强度曲线</h2><span class="panel-note">专业视角 · 相对强度</span></div><div class="panel-body">${curveSvg(v.plotCurve,v.duration,'#B7443C')}<div class="curve-analysis"><b>文字分析</b><p><b>黄金3秒钩子：</b>不解释背景，先把“删除记录”这个结果放到观众眼前，冲突从第一帧成立。</p><p><b>反转与节奏：</b>18 秒的缓和是假降压，36 秒规则压制抬升冲突，72 秒后台截图完成全段最大反转。</p><p><b>卡点留存：</b>结尾不收束胜负，让客户追问数据来源，把下一集问题从“她能否证明”升级为“公司如何回应”。</p></div></div></section><section class="panel"><div class="panel-head"><h2>观众情绪曲线</h2><span class="panel-note">普通观众视角 · 定性情绪值</span></div><div class="panel-body">${curveSvg(v.emotionCurve,v.duration,'#36745E')}<div class="curve-analysis" style="border-left-color:var(--good)"><b>文字分析</b><p>前 3 秒由信息缺口带来期待；周既明用公司资产条款压回主角时，观众从憋闷跌到愤怒低谷。</p><p><b>峰值分析：</b>72 秒截图把观众掌握的信息变成不可否认的证据，解气感冲到全段峰值；随后金句与两秒静默把爽点转化为价值认同。</p></div></div></section></div>`;else if(a.activeTab==='storyboard')content=`<section class="panel"><div class="panel-head"><h2>分镜时序表</h2><span class="panel-note">AI 镜头识别结果 · 演示数据</span></div><div class="table-wrap"><table class="table storyboard-table"><thead><tr><th>时间戳（秒）</th><th>景别与运镜</th><th>音效语言/BGM</th><th>画面视觉描述</th><th>台词</th><th>世界线剧情强度值</th><th>观众情绪值</th></tr></thead><tbody>${v.storyboard.map((r,rowIndex)=>`<tr>${r.map((c,i)=>`<td>${i>4?scoreWithDelta(c,rowIndex?v.storyboard[rowIndex-1][i]:null):c}</td>`).join('')}</tr>`).join('')}</tbody></table></div></section>`;else content=`<section class="panel"><div class="panel-head"><h2>规则审核</h2><span class="panel-note">AI 提取规则只有人工确认后才进入资产库</span></div><div class="panel-body rule-list">${v.rules.map(r=>`<article class="rule-card ${r.status}"><div class="rule-head"><span class="tag ${r.status==='approved'?'good':r.status==='rejected'?'red':'yellow'}">${r.status==='approved'?'已通过':r.status==='rejected'?'已驳回':'待人工审核'}</span><div><b>${r.title}</b><div class="small muted">${r.type} · 可信度 ${r.confidence}%${r.edited?' · 已人工编辑':''}</div></div><div class="review-actions"><button class="btn" data-action="open-rule-discussion" data-id="${r.id}">${icon('spark')} 人与AI讨论</button><button class="btn" data-action="edit-rule" data-id="${r.id}" ${r.status!=='pending'?'disabled':''}>${icon('edit')} 人工编辑</button><button class="btn" data-action="review-rule" data-id="${r.id}" data-value="rejected" ${r.status!=='pending'?'disabled':''}>驳回</button><button class="btn primary" data-action="review-rule" data-id="${r.id}" data-value="approved" ${r.status!=='pending'?'disabled':''}>${icon('check')} 确认入库</button></div></div><p>${r.description}</p><div class="reason"><b>证据：</b>${r.evidence}</div></article>`).join('')}</div></section>`;return `${head('内容解剖','聚焦一部漫剧视频，拆解叙事、角色、镜头与观众情绪，并提炼可复用规则。','<span class="demo-badge">AI 分析结果为演示数据</span>')}<div class="analysis-selector"><b>视频选择</b><select class="select" data-scope="analysis" data-field="selectedVideo">${a.videos.map(x=>`<option value="${x.id}" ${x.id===v.id?'selected':''}>${x.title}</option>`).join('')}</select><span class="muted small">${v.source} · ${v.duration} 秒 · ${v.genre}</span></div><nav class="subtabs" aria-label="内容解剖视图">${tabs.map(t=>`<button class="subtab ${a.activeTab===t[0]?'active':''}" data-action="select-analysis-tab" data-value="${t[0]}">${t[1]}</button>`).join('')}</nav>${content}`}
    function analysisContentFor(tab){const previous=state.analysis.activeTab;state.analysis.activeTab=tab;const full=renderAnalysis(),marker='</nav>',start=full.indexOf(marker);state.analysis.activeTab=previous;return start>=0?full.slice(start+marker.length):full}
    function renderAnalysisV2(){const a=state.analysis,v=selectedAnalysisVideo(),sections=[['overview','概览','内容梗概与快速判断'],['settings','设定与角色','世界观、阵营与角色人工标记'],['curves','世界线与情绪分析','剧情强度与观众情绪变化'],['storyboard','分镜时序','镜头级时序与数值变化'],['rules','规则审核','确认可复用的内容规则']];return `${head('内容解剖V2','将同一部漫剧的五类分析从上到下集中呈现，便于完整审阅与人工确认。','<span class="demo-badge">AI 分析结果为演示数据</span>')}<div class="analysis-selector"><b>视频选择</b><select class="select" data-scope="analysis" data-field="selectedVideo">${a.videos.map(x=>`<option value="${x.id}" ${x.id===v.id?'selected':''}>${x.title}</option>`).join('')}</select><span class="muted small">${v.source} · ${v.duration} 秒 · ${v.genre}</span></div><div class="analysis-v2-sections">${sections.map(([tab,label,note])=>`<section class="analysis-v2-section" id="analysis-v2-${tab}"><div class="analysis-v2-heading"><h2>${label}</h2><span>${note}</span></div>${analysisContentFor(tab)}</section>`).join('')}</div>`}
    function filteredAssets(){const a=state.assets,q=a.query.trim().toLowerCase();return a.items.filter(x=>(a.type==='全部'||x.type===a.type)&&(a.tag==='全部'||[...x.tags,...x.genre,...x.emotions].includes(a.tag))&&(!q||[x.title,x.desc,x.type,...x.tags,...x.genre,...x.emotions].join(' ').toLowerCase().includes(q)))}
    const assetTypeOrder=['选题','人物','情节','桥段','台词','场景','规则'];
    function groupedAssets(items){return assetTypeOrder.map(type=>[type,items.filter(x=>x.type===type)]).filter(([,group])=>group.length)}
    function renderAssetCard(x,a){return `<article class="asset-card" data-action="open-asset" data-id="${x.id}"><img class="asset-visual" src="${media[x.image]}" alt="${x.title}"><div class="asset-body"><div class="asset-top"><span class="tag ${x.type==='规则'?'yellow':''}">${x.type}</span><div class="asset-title">${x.title}</div><button class="btn icon-only ghost ${a.favorites.includes(x.id)?'favorite':''}" data-action="toggle-favorite" data-id="${x.id}" title="${a.favorites.includes(x.id)?'取消收藏':'收藏资产'}">${icon('heart')}</button></div><p class="small muted">${x.desc}</p><div class="asset-meta"><div><span class="inline-label">题材</span>${x.genre.map(t=>`<span class="tag outline">${t}</span>`).join(' ')}</div><div><span class="inline-label">情绪</span>${x.emotions.map(t=>`<span class="tag red">${t}</span>`).join(' ')}</div></div><div class="asset-actions">${x.type==='规则'?`<span class="status ${x.review==='approved'?'ready':'processing'}">${x.review==='approved'?'人工审核通过':'待人工审核'}</span>`:''}<span class="spacer"></span><button class="btn" data-action="generate-prompt" data-id="${x.id}">${icon('spark')} 生成 Prompt</button></div></div></article>`}
    function renderAssetTable(items,a){return `<div class="panel table-wrap"><table class="table asset-table"><thead><tr><th>名称</th><th>说明</th><th>题材</th><th>情绪</th><th>审核状态</th><th>操作</th></tr></thead><tbody>${items.map(x=>`<tr><td><button class="btn ghost asset-link" data-action="open-asset" data-id="${x.id}">${x.title}</button></td><td class="small muted">${x.desc}</td><td>${x.genre.map(t=>`<span class="tag outline">${t}</span>`).join(' ')}</td><td>${x.emotions.map(t=>`<span class="tag red">${t}</span>`).join(' ')}</td><td>${x.type==='规则'?`<span class="status ${x.review==='approved'?'ready':'processing'}">${x.review==='approved'?'人工审核通过':'待人工审核'}</span>`:'<span class="status ready">可复用</span>'}</td><td><div class="asset-row-actions"><button class="btn icon-only ghost ${a.favorites.includes(x.id)?'favorite':''}" data-action="toggle-favorite" data-id="${x.id}" title="${a.favorites.includes(x.id)?'取消收藏':'收藏资产'}">${icon('heart')}</button><button class="btn" data-action="generate-prompt" data-id="${x.id}">${icon('spark')} 生成 Prompt</button></div></td></tr>`).join('')}</tbody></table></div>`}
    function renderAssetGroups(items,a){return `<div class="asset-groups">${groupedAssets(items).map(([type,group])=>`<section class="asset-group"><div class="asset-group-head"><h2>${type} · ${group.length}</h2><span class="asset-group-note">${type==='规则'?'经人工审核后进入复用流程':'按题材与情绪标签管理'}</span></div>${a.view==='grid'?`<div class="asset-grid">${group.map(x=>renderAssetCard(x,a)).join('')}</div>`:renderAssetTable(group,a)}</section>`).join('')}</div>`}
    function renderAssets(){const a=state.assets,items=filteredAssets();return `${head('资产仓库','分类沉淀选题、人物、情节、桥段、台词、场景与已审核规则，并转化为可复用 Prompt。','<span class="demo-badge">素材内容为演示数据</span>')}<div class="panel"><div class="panel-body"><div class="searchbox">${icon('search')}<input class="field" id="asset-search" value="${a.query}" placeholder="搜索素材、规则、题材或情绪"><button class="btn primary" data-action="run-asset-search">搜索</button></div><div class="toolbar" style="margin-top:10px;margin-bottom:0"><select class="select" data-scope="assets" data-field="type">${['全部',...assetTypeOrder].map(x=>`<option ${a.type===x?'selected':''}>${x}</option>`).join('')}</select><select class="select" data-scope="assets" data-field="tag">${['全部','女性成长','现实职场','身份逆袭','觉醒','解气','压抑','节奏'].map(x=>`<option ${a.tag===x?'selected':''}>${x}</option>`).join('')}</select><span class="muted small">${items.length} 项资产 · 规则需人工审核</span><span class="spacer"></span><div class="segmented"><button class="segment ${a.view==='grid'?'active':''}" data-action="set-view" data-value="grid" title="卡片视图">${icon('grid')} 卡片</button><button class="segment ${a.view==='list'?'active':''}" data-action="set-view" data-value="list" title="列表视图">${icon('list')} 表格</button></div></div></div></div>${items.length?renderAssetGroups(items,a):`<div class="panel empty" style="margin-top:12px">${icon('archive')}<div><b>没有符合条件的素材或规则</b><p>尝试更换类型、题材或情绪词。</p></div><button class="btn" data-action="clear-asset-filters">清除筛选</button></div>`}`}
    function renderDrawer(){const d=state.ui.drawer;if(!d)return'';let body='';if(d.type==='drama'){const x=state.radar.dramas.find(v=>v.id===d.id);body=`<div class="media-row"><img class="poster-lg" src="${media[x.poster]}" alt="${x.title}"><div><h3>${x.title}</h3><p>${x.hook}</p><span class="tag red">${x.genre}</span></div></div><div class="divider"></div><h3>高赞评论与需求洞察</h3>${x.comments.map(c=>`<div class="comment"><div>${c[0]}</div><div class="comment-meta">${c[1]}</div></div>`).join('')}<div class="topic-card"><b>可优化方向</b><p>强化现实阻力与人物主动选择，避免反派降智和关系线强行洗白。</p></div>`}else if(d.type==='asset'){const x=state.assets.items.find(v=>v.id===d.id);body=`<img class="thumb" src="${media[x.image]}" alt="${x.title}"><h3>${x.title}</h3><p>${x.desc}</p><div class="tag-editor">${x.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div><div class="divider"></div><b>题材</b><div class="tag-editor">${x.genre.map(t=>`<span class="tag outline">${t}</span>`).join('')}</div><b style="display:block;margin-top:12px">情绪</b><div class="tag-editor">${x.emotions.map(t=>`<span class="tag red">${t}</span>`).join('')}</div>`}else{body='<p>任务已完成，可进入“内容解剖”继续处理。</p>'}return `<div class="drawer-backdrop" data-action="close-drawer"></div><aside class="drawer" role="dialog" aria-modal="true"><div class="drawer-head"><h2>详情</h2><button class="btn icon-only ghost drawer-close" data-action="close-drawer" title="关闭详情">${icon('x')}</button></div><div class="drawer-body">${body}</div></aside>`}
    function generatedPrompt(x){return `请基于素材【${x.title}】创作一段 1–2 分钟漫剧内容。题材方向：${x.genre.join('、')}；目标情绪：${x.emotions.join('、')}。核心素材：${x.desc}。要求前三秒建立明确冲突，人物行动符合现实逻辑，结尾留下可追看的信息缺口，并输出场景、人物动作、台词和镜头提示。`}
    function renderOverlays(){let html=renderDrawer(),m=state.ui.modal;if(m==='reset')html+=`<div class="modal-backdrop"><div class="modal" role="dialog" aria-modal="true"><h2>重置样例数据？</h2><p class="muted">收藏、处理进度、人工标记和审核记录都会恢复到初始状态。</p><div class="modal-actions"><button class="btn" data-action="cancel-reset">取消</button><button class="btn primary" data-action="confirm-reset">确认重置</button></div></div></div>`;if(m==='help')html+=`<div class="modal-backdrop"><div class="modal" role="dialog" aria-modal="true"><h2>演示数据说明</h2><p>平台名称用于模拟真实工作环境；榜单、评论、热度、项目、人物和分析结果全部为虚构演示数据，不代表任何平台真实排名。</p><div class="modal-actions"><button class="btn primary" data-action="close-help">知道了</button></div></div></div>`;if(m?.type==='topic-discussion'){const c=selectedTopicCard(m.id),messages=state.radar.discussions[m.id]||[],hasHuman=messages.some(x=>x.role==='human');if(c)html+=`<div class="modal-backdrop"><div class="modal" role="dialog" aria-modal="true" style="width:min(680px,100%)"><h2>人与AI讨论 · ${c.title}</h2><p class="small muted">AI 提供提案和推演，人负责判断价值、现实逻辑与最终取舍；确认后才进入选题库。</p><div class="discussion-thread">${messages.map(x=>`<div class="discussion-message ${x.role}"><span class="discussion-role">${x.role==='human'?'编剧':'AI 选题助手'}</span>${x.text}</div>`).join('')}</div><div class="discussion-composer"><input class="field" id="topic-discussion-input" placeholder="输入你的判断、质疑或修改方向"><button class="btn primary" data-action="send-topic-message" data-id="${c.id}">${icon('spark')} 发送</button></div><div class="modal-actions"><button class="btn" data-action="close-modal">暂存讨论</button><button class="btn primary" data-action="confirm-topic" data-id="${c.id}" ${hasHuman?'':'disabled'}>${icon('check')} ${state.radar.topicLibraryIds.includes(c.id)?'已进入选题库':'确认进入选题库'}</button></div></div></div>`}if(m?.type==='rule-discussion'){const r=selectedRule(m.id),messages=state.analysis.ruleDiscussions[m.id]||[];if(r)html+=`<div class="modal-backdrop"><div class="modal" role="dialog" aria-modal="true" style="width:min(680px,100%)"><h2>规则讨论 · ${r.title}</h2><p class="small muted">与 AI 核对适用边界、反例和表达精度，讨论结果不会自动入库。</p><div class="discussion-thread">${messages.map(x=>`<div class="discussion-message ${x.role}"><span class="discussion-role">${x.role==='human'?'审核人':'AI 规则助手'}</span>${x.text}</div>`).join('')}</div><div class="discussion-composer"><input class="field" id="rule-discussion-input" placeholder="输入质疑、反例或修改方向"><button class="btn primary" data-action="send-rule-message" data-id="${r.id}">${icon('spark')} 发送</button></div><div class="modal-actions"><button class="btn" data-action="close-modal">暂存讨论</button><button class="btn primary" data-action="edit-rule" data-id="${r.id}">${icon('edit')} 转入人工编辑</button></div></div></div>`}if(m?.type==='rule-edit'){const r=selectedRule(m.id);if(r)html+=`<div class="modal-backdrop"><div class="modal" role="dialog" aria-modal="true" style="width:min(620px,100%)"><h2>人工编辑规则</h2><p class="small muted">编辑后的版本将作为人工确认入库的最终内容。</p><label class="small strong" for="rule-title">规则名称</label><input class="field" id="rule-title" style="width:100%;margin:5px 0 12px" value="${r.title}"><label class="small strong" for="rule-type">规则类型</label><input class="field" id="rule-type" style="width:100%;margin:5px 0 12px" value="${r.type}"><label class="small strong" for="rule-description">规则描述</label><textarea class="textarea" id="rule-description" style="min-height:90px;margin:5px 0 12px">${r.description}</textarea><label class="small strong" for="rule-evidence">分析证据</label><textarea class="textarea" id="rule-evidence" style="min-height:78px;margin-top:5px">${r.evidence}</textarea><div class="modal-actions"><button class="btn" data-action="close-modal">取消</button><button class="btn primary" data-action="save-rule-edit" data-id="${r.id}">${icon('check')} 保存人工版本</button></div></div></div>`}if(m?.type==='character'){const c=selectedAnalysisVideo().characters.find(x=>x.id===m.id);if(c)html+=`<div class="modal-backdrop"><div class="modal" role="dialog" aria-modal="true"><h2>人工标记角色</h2><p class="small muted">修正 AI 角色识别结果，保存后标记为人工确认。</p><label class="small strong" for="character-name">角色名字</label><input class="field" id="character-name" style="width:100%;margin:5px 0 12px" value="${c.name}"><label class="small strong" for="character-type">角色类型</label><select class="select" id="character-type" style="width:100%;margin:5px 0 12px">${['主角正1','主角反1','配角','NPC'].map(x=>`<option ${c.type===x?'selected':''}>${x}</option>`).join('')}</select><label class="small strong" for="character-attribute">角色属性</label><textarea class="textarea" id="character-attribute" style="min-height:90px;margin-top:5px">${c.attribute}</textarea><div class="modal-actions"><button class="btn" data-action="close-modal">取消</button><button class="btn primary" data-action="save-character" data-id="${c.id}">${icon('check')} 保存标记</button></div></div></div>`}if(m?.type==='prompt'){const x=state.assets.items.find(v=>v.id===m.id);if(x)html+=`<div class="modal-backdrop"><div class="modal" role="dialog" aria-modal="true" style="width:min(620px,100%)"><h2>生成 Prompt</h2><p class="small muted">已结合素材类型、题材和目标情绪生成，可继续编辑。</p><textarea class="textarea" id="generated-prompt" style="min-height:190px">${generatedPrompt(x)}</textarea><div class="modal-actions"><button class="btn" data-action="close-modal">关闭</button><button class="btn primary" data-action="copy-generated-prompt">${icon('copy')} 复制 Prompt</button></div></div></div>`}if(state.ui.toast)html+=`<div class="toast ${state.ui.toast.type}" role="status">${state.ui.toast.message}</div>`;document.getElementById('overlays').innerHTML=html;hydrateIcons()}
    function hydrateIcons(){document.querySelectorAll('[data-icon]').forEach(el=>{el.innerHTML=icon(el.dataset.icon)})}
    function setLater(fn,message){setTimeout(()=>{fn();persistState();renderApp();setToast(message);renderOverlays()},650)}
    async function copyText(text){try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(text);return true}const t=document.createElement('textarea');t.value=text;t.style.position='fixed';t.style.opacity='0';document.body.appendChild(t);t.select();const ok=document.execCommand('copy');t.remove();return ok}catch(e){return false}}
    function dispatch(action,el){const id=el?.dataset.id,value=el?.dataset.value;switch(action){
      case'navigate':state.ui.activeModule=el.dataset.module;state.ui.drawer=null;break;
      case'select-drama':state.radar.selectedDrama=id;break;case'open-drama':state.ui.drawer={type:'drama',id};break;case'select-theme':state.radar.selectedTheme=id;break;
      case'open-topic-discussion':if(!state.radar.discussions[id])state.radar.discussions[id]=[{role:'ai',text:'这是 AI 生成的初步方向。请从人物动机、现实逻辑和观众需求三个角度提出你的判断。'}];state.ui.modal={type:'topic-discussion',id};break;
      case'send-topic-message':{const input=document.getElementById('topic-discussion-input'),message=input?input.value.trim():'';if(!message){setToast('请输入你的判断或修改方向','error');break}const messages=state.radar.discussions[id]||(state.radar.discussions[id]=[]);messages.push({role:'human',text:message});messages.push({role:'ai',text:'你的判断补足了 AI 提案中的现实约束。建议把这项代价前置到前三集，并让主角通过主动选择而不是偶然开挂完成反击。'});setToast('AI 已根据你的判断继续推演');break}
      case'confirm-topic':{const c=selectedTopicCard(id),messages=state.radar.discussions[id]||[];if(!c||!messages.some(x=>x.role==='human')){setToast('至少完成一轮人工讨论后才能进入选题库','error');break}if(!state.radar.topicLibraryIds.includes(id))state.radar.topicLibraryIds.push(id);if(!state.assets.items.some(x=>x.id==='topic-'+id))state.assets.items.unshift({id:'topic-'+id,type:'选题',title:c.title,desc:c.conflict,tags:['人与AI共创','备选选题'],genre:[c.theme,'漫剧选题'],emotions:[c.theme==='关系祛魅'?'觉醒':'焦虑','期待'],image:id==='tc1'?0:1,review:'approved'});state.ui.modal=null;setToast('选题已确认并进入资产仓库');break}
      case'process-job':{const input=document.getElementById('source-url'),raw=input.value.trim();state.ingestion.url=raw;if(!raw){state.ingestion.error='请输入网页或视频链接。';break}let valid=false;try{const u=new URL(raw);valid=['http:','https:'].includes(u.protocol)}catch(e){}if(!valid){state.ingestion.error='链接格式无效，请输入以 http:// 或 https:// 开头的地址。';break}state.ingestion.error='';const job={id:'j'+Date.now(),name:raw.replace(/^https?:\/\//,''),type:document.getElementById('source-type').value,source:'网页',status:'processing',progress:18,time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})};state.ingestion.jobs.unshift(job);state.ingestion.url='';setLater(()=>{job.status='ready';job.progress=100},'链接内容已完成采集');break}
      case'retry-job':{const j=state.ingestion.jobs.find(x=>x.id===id);j.status='processing';j.progress=42;setLater(()=>{j.status='ready';j.progress=100},'失败任务已重试并完成');break}
      case'open-job':state.ui.drawer={type:'job',id};break;
      case'select-warehouse-type':state.ingestion.selectedType=value;break;
      case'select-analysis-tab':state.analysis.activeTab=value;break;
      case'set-character-view':state.analysis.characterView=value;break;
      case'edit-character':state.ui.modal={type:'character',id};break;
      case'save-character':{const c=selectedAnalysisVideo().characters.find(x=>x.id===id),name=document.getElementById('character-name'),type=document.getElementById('character-type'),attr=document.getElementById('character-attribute');if(c&&name&&type&&attr){c.name=name.value.trim()||c.name;c.type=type.value;c.attribute=attr.value.trim()||c.attribute;c.manual=true;state.ui.modal=null;setToast('角色人工标记已更新')}break}
      case'open-rule-discussion':if(!state.analysis.ruleDiscussions[id])state.analysis.ruleDiscussions[id]=[{role:'ai',text:'请从适用场景、反例和信息披露程度三个角度审核这条规则。'}];state.ui.modal={type:'rule-discussion',id};break;
      case'send-rule-message':{const input=document.getElementById('rule-discussion-input'),message=input?input.value.trim():'';if(!message){setToast('请输入你的判断、反例或修改方向','error');break}const messages=state.analysis.ruleDiscussions[id]||(state.analysis.ruleDiscussions[id]=[]);messages.push({role:'human',text:message});messages.push({role:'ai',text:'这个修正能降低规则被机械套用的风险。建议在人工版本中同时写清“先给什么”和“必须保留什么信息缺口”。'});setToast('AI 已根据你的意见补充规则边界');break}
      case'edit-rule':state.ui.modal={type:'rule-edit',id};break;
      case'save-rule-edit':{const r=selectedRule(id),title=document.getElementById('rule-title'),type=document.getElementById('rule-type'),desc=document.getElementById('rule-description'),evidence=document.getElementById('rule-evidence');if(r&&title&&type&&desc&&evidence){r.title=title.value.trim()||r.title;r.type=type.value.trim()||r.type;r.description=desc.value.trim()||r.description;r.evidence=evidence.value.trim()||r.evidence;r.edited=true;state.ui.modal=null;setToast('人工编辑版本已保存，可继续确认入库')}break}
      case'review-rule':{const v=selectedAnalysisVideo(),r=v.rules.find(x=>x.id===id);if(r){r.status=value;if(value==='approved'){const asset=state.assets.items.find(x=>x.id==='rule-'+id),latest={id:'rule-'+id,type:'规则',title:r.title,desc:r.description,tags:[r.type,'内容解剖',r.edited?'人工编辑':'人工确认'],genre:[v.genre],emotions:['期待','解气'],image:v.poster,review:'approved'};asset?Object.assign(asset,latest):state.assets.items.unshift(latest)}setToast(value==='approved'?'规则已通过人工审核并进入资产仓库':'规则已驳回')}break}
      case'set-view':state.assets.view=value;break;case'open-asset':state.ui.drawer={type:'asset',id};break;
      case'toggle-favorite':{const a=state.assets.favorites,i=a.indexOf(id);i>=0?a.splice(i,1):a.push(id);setToast(i>=0?'已取消收藏':'已收藏资产');break}
      case'clear-asset-filters':state.assets.type='全部';state.assets.tag='全部';state.assets.query='';break;
      case'run-asset-search':state.assets.query=document.getElementById('asset-search').value.trim();setToast(filteredAssets().length?'素材搜索完成':'未找到匹配素材');break;
      case'generate-prompt':state.ui.modal={type:'prompt',id};break;
      case'copy-generated-prompt':{const p=document.getElementById('generated-prompt');copyText(p?p.value:'').then(ok=>{setToast(ok?'Prompt 已复制':'复制失败，请手动选择文本',ok?'':'error');renderOverlays()});return}
      case'close-drawer':state.ui.drawer=null;break;case'close-modal':state.ui.modal=null;break;case'open-help':state.ui.modal='help';break;case'close-help':state.ui.modal=null;break;case'reset-demo':state.ui.modal='reset';break;case'cancel-reset':state.ui.modal=null;break;case'confirm-reset':try{localStorage.removeItem(STORAGE_KEY)}catch(e){}state=clone(initialData);setToast('样例数据已重置');break;
    }persistState();renderApp()}
    document.addEventListener('click',e=>{const el=e.target.closest('[data-action]');if(!el)return;e.preventDefault();e.stopPropagation();dispatch(el.dataset.action,el)});
    document.addEventListener('change',e=>{const el=e.target;if(el.dataset.scope&&el.dataset.field){state[el.dataset.scope][el.dataset.field]=el.value;if(el.dataset.scope==='analysis'&&el.dataset.field==='selectedVideo')state.analysis.activeTab='overview';persistState();renderApp();return}if(el.dataset.action==='upload-file'){const file=el.files[0];if(!file)return;const ext=file.name.split('.').pop().toLowerCase(),allowed=['pdf','docx','txt','csv','jpg','jpeg','png'];if(!allowed.includes(ext)||file.size>20*1024*1024){state.ingestion.error=allowed.includes(ext)?'文件超过 20MB，无法加入处理队列。':'不支持该文件格式，请上传 PDF、DOCX、TXT、CSV、JPG 或 PNG。';renderApp();return}state.ingestion.error='';const job={id:'j'+Date.now(),name:file.name,type:ext==='csv'?'评论数据':'本地资料',source:'本地文件',status:'processing',progress:12,time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})};state.ingestion.jobs.unshift(job);renderApp();setLater(()=>{job.status='ready';job.progress=100},'文件已完成清洗与入库')}});
    document.addEventListener('input',e=>{if(e.target.id==='source-url')state.ingestion.url=e.target.value;if(e.target.id==='asset-search')state.assets.query=e.target.value});
    renderApp();if(!state.ui.storageOk){setToast('浏览器禁止本地存储，本次操作仅在当前页面有效','error');renderOverlays()}
  })();
  </script>
</body>
