    function renderContinuity(){const c=state.continuity;const ch=c.characters.find(x=>x.name===c.selectedCharacter)||c.characters[0];const risks=c.risks.filter(r=>c.riskFilter==='本集'?r.episode===c.selectedEpisode:c.riskFilter==='全部'||r.level===c.riskFilter);const events=c.events[c.selectedEpisode]||[['大纲节点','本集尚未进入场景级拆解。']];return `${head('连续性管理','追踪 72 集项目中的人物状态、关系变化、伏笔和重复桥段。','<span class="demo-badge">当前展示第 1–12 集样例</span>')}
      <section class="panel"><div class="panel-head"><h2>分集时间线</h2><span class="panel-note">计划 72 集 · 当前定稿 6 集</span></div><div class="panel-body"><div class="episode-strip">${c.episodes.map(e=>`<button class="episode ${e.no===c.selectedEpisode?'active':''}" data-action="select-episode" data-value="${e.no}"><b>${String(e.no).padStart(2,'0')}</b><div class="small">${e.title}</div><span class="status ${e.status==='定稿'?'ready':e.status==='修订'?'processing':'pending'}">${e.status}</span></button>`).join('')}</div></div></section>
      <div class="grid-even" style="margin-top:12px"><section class="panel"><div class="panel-head"><h2>第 ${c.selectedEpisode} 集关键事件</h2></div><div class="panel-body"><div class="timeline">${events.map(e=>`<div class="event"><b>${e[0]}</b><div class="muted small">${e[1]}</div></div>`).join('')}</div><div class="divider"></div><div class="toolbar"><select class="select" data-scope="continuity" data-field="selectedCharacter">${c.characters.map(x=>`<option ${x.name===ch.name?'selected':''}>${x.name}</option>`).join('')}</select></div><div class="media-row"><img class="avatar" src="${media[ch.image]}" alt="${ch.name}"><div><b>${ch.name}</b><p class="small"><b>当前状态：</b>${ch.state}</p><p class="small"><b>关系变化：</b>${ch.relation}</p><p class="small"><b>阶段目标：</b>${ch.goal}</p></div></div></div></section>
      <section class="panel"><div class="panel-head"><h2>连续性风险</h2><select class="select" data-scope="continuity" data-field="riskFilter"><option>全部</option><option>高</option><option>中</option><option>本集</option></select></div><div class="panel-body">${risks.length?risks.map(r=>`<div class="risk ${r.level==='中'?'medium':''} ${c.verifiedRiskIds.includes(r.id)?'verified':''}"><div class="risk-top"><span class="tag ${r.level==='高'?'red':'yellow'}">${r.level}风险</span><b>${r.title}</b><div class="risk-actions"><button class="btn" data-action="verify-risk" data-id="${r.id}">${icon('check')} ${c.verifiedRiskIds.includes(r.id)?'已核验':'标记核验'}</button></div></div><p class="small muted">第 ${r.episode} 集 · ${r.desc}</p></div>`).join(''):'<div class="empty">当前筛选下没有连续性风险</div>'}</div></section></div>`}
    function defaultPrompt(shot){return state.generation.mode==='image'?`电影感写实画面，${shot.desc}，现代内容公司会议室，克制的冷灰环境光，人物表情真实，竖屏构图，保持林岚角色一致性`:`${shot.desc}。镜头缓慢向前跟随，人物步伐稳定，会议室人群保持静默，屏幕冷光逐渐增强，时长 ${shot.duration}，无字幕，无镜头抖动`}
    function renderGeneration(){const g=state.generation,shot=g.shots.find(x=>x.id===g.selectedShot)||g.shots[0];if(!g.prompt)g.prompt=defaultPrompt(shot);return `${head('下游生成衔接','把定稿剧本拆成分镜、视觉设定和生图/生视频生产包。','<span class="demo-badge">生成任务均为演示</span>')}
      <div class="toolbar"><span class="tag outline">第 6 集定稿</span><span class="tag outline">场 2 · 会议室复盘</span><span class="spacer"></span><span class="muted small">已导出 ${g.exports} 次</span></div><div class="grid-2"><section class="panel"><div class="panel-head"><h2>分镜列表</h2><span class="panel-note">3 个镜头</span></div><div class="panel-body shot-list">${g.shots.map(x=>`<div class="shot ${x.id===shot.id?'selected':''}" data-action="select-shot" data-id="${x.id}"><img src="${media[x.image]}" alt="${x.title}"><div><b>${x.no} · ${x.title}</b><p class="small muted">${x.desc}</p><span class="tag">${x.duration}</span></div></div>`).join('')}</div></section>
      <section class="panel"><div class="panel-head"><h2>生产提示词</h2></div><div class="panel-body"><img class="thumb" src="${media[shot.image]}" alt="${shot.title}"><div class="prompt-meta" style="margin-top:10px"><div class="segmented"><button class="segment ${g.mode==='image'?'active':''}" data-action="set-generation-mode" data-value="image">生图</button><button class="segment ${g.mode==='video'?'active':''}" data-action="set-generation-mode" data-value="video">生视频</button></div><select class="select" data-scope="generation" data-field="ratio">${['9:16','16:9','1:1'].map(x=>`<option ${g.ratio===x?'selected':''}>${x}</option>`).join('')}</select><span class="tag yellow">角色一致性锁定</span></div><textarea class="textarea" id="prompt-editor">${g.prompt}</textarea><div class="toolbar" style="margin-top:10px;margin-bottom:0"><button class="btn" data-action="copy-prompt">${icon('copy')} 复制提示词</button><button class="btn primary" data-action="export-package">${icon('download')} 导出 JSON 生产包</button></div></div></section></div>`}
    function qualityScore(){return Math.min(99,state.quality.baseScore+state.quality.issues.filter(x=>state.quality.acceptedSuggestionIds.includes(x.id)).reduce((n,x)=>n+x.boost,0))}
    function renderQuality(){const q=state.quality,score=qualityScore(),issues=q.issues.filter(x=>q.severity==='全部'||x.level===q.severity);return `${head('质量评估与迭代','评估剧本质量、采纳修改建议，并把有效反馈回流知识库。','<span class="demo-badge">AI 评分为演示数据</span>')}
      <div class="toolbar"><select class="select" data-scope="quality" data-field="selectedTarget">${['第 6 集定稿','第 5 集定稿','第 7 集修订稿'].map(x=>`<option ${q.selectedTarget===x?'selected':''}>${x}</option>`).join('')}</select><select class="select" data-scope="quality" data-field="severity">${['全部','高','中'].map(x=>`<option ${q.severity===x?'selected':''}>${x}</option>`).join('')}</select><span class="spacer"></span><button class="btn" data-action="submit-feedback">${icon('spark')} 提交反馈回流</button></div>
      <div class="grid-even"><section class="panel"><div class="panel-head"><h2>综合质量</h2><span class="panel-note">${q.selectedTarget}</span></div><div class="panel-body score-layout"><div class="score-ring"><div><b>${score}</b><div class="small muted" style="text-align:center">/ 100</div></div></div><div class="score-bars">${q.dimensions.map((d,i)=>{const accepted=q.acceptedSuggestionIds.length;const val=Math.min(99,d[1]+(i<3?accepted:0));return `<div class="bar-row"><span>${d[0]}</span><div class="bar-track"><div class="bar-fill ${i===3?'good':i===2?'yellow':''}" style="width:${val}%"></div></div><b>${val}</b></div>`}).join('')}</div></div></section><section class="panel"><div class="panel-head"><h2>评估结论</h2></div><div class="panel-body"><div class="topic-card"><b>当前判断</b><p>核心冲突成立、可拍性较高；证据链铺垫和反派回应仍影响情绪峰值可信度。</p></div><div class="divider"></div>${metric('待处理问题',q.issues.length-q.acceptedSuggestionIds.length,'采纳建议后自动更新','red')}${metric('反馈回流',q.feedbackCount,'已沉淀为质量规则','good')}</div></section></div>
      <section class="panel" style="margin-top:12px"><div class="panel-head"><h2>问题与修改建议</h2><span class="panel-note">${issues.length} 项</span></div><div class="panel-body">${issues.map(x=>`<div class="issue ${x.level==='中'?'medium':''} ${q.acceptedSuggestionIds.includes(x.id)?'accepted':''}"><div class="issue-head"><span class="tag ${x.level==='高'?'red':'yellow'}">${x.level}</span><b>${x.title}</b><div class="issue-actions"><button class="btn" data-action="accept-suggestion" data-id="${x.id}" ${q.acceptedSuggestionIds.includes(x.id)?'disabled':''}>${icon('check')} ${q.acceptedSuggestionIds.includes(x.id)?'已采纳':'采纳建议'}</button></div></div><p class="small muted">${x.desc}</p><div class="reason"><b>建议：</b>${x.suggestion} <span class="tag good">预计 +${x.boost} 分</span></div></div>`).join('')}</div></section>`}
    function renderDrawer(){const d=state.ui.drawer;if(!d)return'';let body='';if(d.type==='drama'){const x=state.radar.dramas.find(v=>v.id===d.id);body=`<div class="media-row"><img class="poster-lg" src="${media[x.poster]}" alt="${x.title}"><div><h3>${x.title}</h3><p>${x.hook}</p><span class="tag red">${x.genre}</span></div></div><div class="divider"></div><h3>高赞评论与需求洞察</h3>${x.comments.map(c=>`<div class="comment"><div>${c[0]}</div><div class="comment-meta">${c[1]}</div></div>`).join('')}<div class="topic-card"><b>可优化方向</b><p>强化现实阻力与人物主动选择，避免反派降智和关系线强行洗白。</p></div>`}else if(d.type==='asset'){const x=state.assets.items.find(v=>v.id===d.id);body=`<img class="thumb" src="${media[x.image]}" alt="${x.title}"><h3>${x.title}</h3><p>${x.desc}</p><div class="tag-editor">${x.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div><div class="divider"></div><b>引用记录</b><p class="small muted">《她的第二人生》第 6 集 · 已引用 2 次</p>`}else{body='<p>任务已完成，可进入“知识结构化”继续处理。</p>'}return `<div class="drawer-backdrop" data-action="close-drawer"></div><aside class="drawer" role="dialog" aria-modal="true"><div class="drawer-head"><h2>详情</h2><button class="btn icon-only ghost drawer-close" data-action="close-drawer" title="关闭详情">${icon('x')}</button></div><div class="drawer-body">${body}</div></aside>`}
    function renderOverlays(){let html=renderDrawer();if(state.ui.modal==='reset')html+=`<div class="modal-backdrop"><div class="modal" role="dialog" aria-modal="true"><h2>重置样例数据？</h2><p class="muted">收藏、处理进度、核验记录和反馈数据都会恢复到初始状态。</p><div class="modal-actions"><button class="btn" data-action="cancel-reset">取消</button><button class="btn primary" data-action="confirm-reset">确认重置</button></div></div></div>`;if(state.ui.modal==='help')html+=`<div class="modal-backdrop"><div class="modal" role="dialog" aria-modal="true"><h2>演示数据说明</h2><p>平台名称用于模拟真实工作环境；榜单、评论、热度、项目、人物和评估结果全部为虚构演示数据，不代表任何平台真实排名。</p><div class="modal-actions"><button class="btn primary" data-action="close-help">知道了</button></div></div></div>`;if(state.ui.toast)html+=`<div class="toast ${state.ui.toast.type}" role="status">${state.ui.toast.message}</div>`;document.getElementById('overlays').innerHTML=html;hydrateIcons()}
    function hydrateIcons(){document.querySelectorAll('[data-icon]').forEach(el=>{el.innerHTML=icon(el.dataset.icon)})}
    function setLater(fn,message){setTimeout(()=>{fn();persistState();renderApp();setToast(message);renderOverlays()},650)}
    async function copyText(text){try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(text);return true}const t=document.createElement('textarea');t.value=text;t.style.position='fixed';t.style.opacity='0';document.body.appendChild(t);t.select();const ok=document.execCommand('copy');t.remove();return ok}catch(e){return false}}
    function downloadPackage(data){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='她的第二人生-第6集-生成生产包.json';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),500)}
    function dispatch(action,el){const id=el?.dataset.id,value=el?.dataset.value;switch(action){
      case'navigate':state.ui.activeModule=el.dataset.module;state.ui.drawer=null;break;
      case'select-drama':state.radar.selectedDrama=id;break;case'open-drama':state.ui.drawer={type:'drama',id};break;case'select-theme':state.radar.selectedTheme=id;break;
      case'save-topic':{const a=state.radar.savedTopicIds,i=a.indexOf(id);i>=0?a.splice(i,1):a.push(id);setToast(i>=0?'已取消收藏':'选题卡已收藏');break}
      case'process-job':{const input=document.getElementById('source-url'),raw=input.value.trim();state.ingestion.url=raw;if(!raw){state.ingestion.error='请输入网页或视频链接。';break}let valid=false;try{const u=new URL(raw);valid=['http:','https:'].includes(u.protocol)}catch(e){}if(!valid){state.ingestion.error='链接格式无效，请输入以 http:// 或 https:// 开头的地址。';break}state.ingestion.error='';const job={id:'j'+Date.now(),name:raw.replace(/^https?:\/\//,''),type:document.getElementById('source-type').value,source:'网页',status:'processing',progress:18,time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})};state.ingestion.jobs.unshift(job);state.ingestion.url='';setLater(()=>{job.status='ready';job.progress=100},'链接内容已完成采集');break}
      case'retry-job':{const j=state.ingestion.jobs.find(x=>x.id===id);j.status='processing';j.progress=42;setLater(()=>{j.status='ready';j.progress=100},'失败任务已重试并完成');break}
      case'open-job':state.ui.drawer={type:'job',id};break;
      case'remove-tag':{const item=state.structure.items.find(x=>x.id===id);item.tags[el.dataset.group]=item.tags[el.dataset.group].filter(x=>x!==el.dataset.value);break}
      case'add-tag':{const input=document.querySelector(`[data-tag-input="${el.dataset.group}"]`),v=input.value.trim();if(v){const item=state.structure.items.find(x=>x.id===id);if(!item.tags[el.dataset.group].includes(v))item.tags[el.dataset.group].push(v)}break}
      case'save-structure':{const item=state.structure.items.find(x=>x.id===id);item.processed=true;if(!state.assets.items.some(x=>x.id==='a-'+id))state.assets.items.unshift({id:'a-'+id,type:'情节',title:item.title,desc:item.text.slice(0,68)+'…',tags:Object.values(item.tags).flat().slice(0,2),image:3});setToast('结构化结果已进入素材资产库');break}
      case'set-view':state.assets.view=value;break;case'open-asset':state.ui.drawer={type:'asset',id};break;
      case'toggle-favorite':{const a=state.assets.favorites,i=a.indexOf(id);i>=0?a.splice(i,1):a.push(id);setToast(i>=0?'已取消收藏':'已收藏资产');break}
      case'clear-asset-filters':state.assets.type='全部';state.assets.tag='全部';break;
      case'preset-search':state.search.query=value;state.search.hasRun=true;break;case'run-search':state.search.query=document.getElementById('search-query').value;state.search.hasRun=true;setToast(searchResults().length?'检索完成':'未找到匹配结果','');break;case'set-search-mode':state.search.mode=value;break;
      case'select-episode':state.continuity.selectedEpisode=Number(value);break;case'verify-risk':{const a=state.continuity.verifiedRiskIds,i=a.indexOf(id);i>=0?a.splice(i,1):a.push(id);setToast(i>=0?'已撤销核验':'风险已标记为核验');break}
      case'select-shot':state.generation.selectedShot=id;state.generation.prompt=defaultPrompt(state.generation.shots.find(x=>x.id===id));break;case'set-generation-mode':state.generation.mode=value;state.generation.prompt=defaultPrompt(state.generation.shots.find(x=>x.id===state.generation.selectedShot));break;
      case'copy-prompt':copyText(document.getElementById('prompt-editor').value).then(ok=>{setToast(ok?'提示词已复制':'复制失败，请手动选择文本',''+(ok?'':'error'));renderOverlays()});return;
      case'export-package':{const p=document.getElementById('prompt-editor').value.trim();if(!p){setToast('提示词为空，无法导出','error');break}state.generation.prompt=p;downloadPackage({project:'她的第二人生',episode:6,shot:state.generation.selectedShot,mode:state.generation.mode,ratio:state.generation.ratio,prompt:p,demoData:true});state.generation.exports++;setToast('JSON 生产包已导出');break}
      case'accept-suggestion':if(!state.quality.acceptedSuggestionIds.includes(id)){state.quality.acceptedSuggestionIds.push(id);setToast('建议已采纳，质量评分已更新')}break;
      case'submit-feedback':state.quality.feedbackCount++;setToast('反馈已回流为知识库质量规则');break;
      case'close-drawer':state.ui.drawer=null;break;case'open-help':state.ui.modal='help';break;case'close-help':state.ui.modal=null;break;case'reset-demo':state.ui.modal='reset';break;case'cancel-reset':state.ui.modal=null;break;case'confirm-reset':try{localStorage.removeItem(STORAGE_KEY)}catch(e){}state=clone(initialData);setToast('样例数据已重置');break;
    }persistState();renderApp()}
    document.addEventListener('click',e=>{const el=e.target.closest('[data-action]');if(!el)return;e.preventDefault();e.stopPropagation();dispatch(el.dataset.action,el)});
    document.addEventListener('change',e=>{const el=e.target;if(el.dataset.scope&&el.dataset.field){state[el.dataset.scope][el.dataset.field]=el.value;persistState();renderApp();return}if(el.dataset.action==='upload-file'){const file=el.files[0];if(!file)return;const ext=file.name.split('.').pop().toLowerCase(),allowed=['pdf','docx','txt','csv','jpg','jpeg','png'];if(!allowed.includes(ext)||file.size>20*1024*1024){state.ingestion.error=allowed.includes(ext)?'文件超过 20MB，无法加入处理队列。':'不支持该文件格式，请上传 PDF、DOCX、TXT、CSV、JPG 或 PNG。';renderApp();return}state.ingestion.error='';const job={id:'j'+Date.now(),name:file.name,type:ext==='csv'?'评论数据':'本地资料',source:'本地文件',status:'processing',progress:12,time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})};state.ingestion.jobs.unshift(job);renderApp();setLater(()=>{job.status='ready';job.progress=100},'文件已完成清洗与入库')}});
    document.addEventListener('input',e=>{if(e.target.id==='source-url')state.ingestion.url=e.target.value;if(e.target.id==='search-query')state.search.query=e.target.value;if(e.target.id==='prompt-editor')state.generation.prompt=e.target.value});
    renderApp();if(!state.ui.storageOk){setToast('浏览器禁止本地存储，本次操作仅在当前页面有效','error');renderOverlays()}
  })();
  </script>
</body>
</html>
