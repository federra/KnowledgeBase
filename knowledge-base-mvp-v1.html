<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>故事智库｜MVP V1</title>
  <style>
    :root {
      --bg: #f5f5f2;
      --surface: #fff;
      --surface-2: #f0f1ef;
      --line: #d7dad8;
      --line-dark: #bcc2c0;
      --text: #25292d;
      --muted: #687077;
      --red: #b7443c;
      --red-soft: #f5e5e2;
      --green: #2f755e;
      --green-soft: #e2f0e9;
      --yellow: #d2aa32;
      --yellow-soft: #f7edcb;
      --blue: #3d6476;
      --blue-soft: #e4edf1;
      --shadow: 0 8px 26px rgba(37, 41, 45, .08);
      --top: 54px;
      --tabs: 48px;
    }
    * { box-sizing: border-box; }
    html { color-scheme: light; }
    body { margin: 0; background: var(--bg); color: var(--text); font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
    button, input, textarea, select { font: inherit; }
    button { color: inherit; }
    .icon { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex: none; }
    .topbar { position: fixed; z-index: 50; inset: 0 0 auto; height: var(--top); display: flex; align-items: center; gap: 18px; padding: 0 18px; background: #fff; border-bottom: 1px solid var(--line); }
    .brand { display: flex; align-items: center; gap: 9px; min-width: 178px; font-weight: 750; font-size: 16px; }
    .brand-mark { display: grid; place-items: center; width: 26px; height: 26px; border-radius: 5px; color: #fff; background: var(--red); font-weight: 800; }
    .project { display: flex; align-items: center; gap: 8px; font-weight: 650; }
    .top-actions { margin-left: auto; display: flex; align-items: center; gap: 6px; }
    .module-tabs { position: fixed; z-index: 45; top: var(--top); left: 0; right: 0; height: var(--tabs); display: flex; justify-content: center; background: #e5e8e8; border-bottom: 1px solid var(--line-dark); }
    .module-tab { min-width: 170px; height: 100%; display: inline-flex; align-items: center; justify-content: center; gap: 9px; border: 0; border-bottom: 3px solid transparent; background: transparent; color: #475057; font-weight: 700; cursor: pointer; }
    .module-tab:hover { background: rgba(255,255,255,.52); }
    .module-tab.active { color: var(--red); background: #fff; border-bottom-color: var(--red); }
    main { padding: calc(var(--top) + var(--tabs) + 22px) 22px 34px; min-height: 100vh; }
    .page-titlebar { max-width: 1500px; margin: 0 auto 16px; display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; }
    h1, h2, h3, p { margin-top: 0; }
    h1 { margin-bottom: 3px; font-size: 23px; letter-spacing: 0; line-height: 1.3; }
    h2 { margin-bottom: 8px; font-size: 17px; letter-spacing: 0; }
    h3 { margin-bottom: 5px; font-size: 14px; letter-spacing: 0; }
    .subtle { color: var(--muted); }
    .tiny { font-size: 12px; }
    .workspace { width: min(1500px, 100%); margin: 0 auto; display: grid; grid-template-columns: 264px minmax(520px, 1fr) 340px; gap: 12px; align-items: start; }
    .panel { background: var(--surface); border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
    .panel-head { min-height: 48px; padding: 11px 13px; display: flex; align-items: center; justify-content: space-between; gap: 10px; border-bottom: 1px solid var(--line); }
    .panel-body { padding: 13px; }
    .sticky { position: sticky; top: calc(var(--top) + var(--tabs) + 14px); }
    .btn { min-height: 34px; display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 6px 11px; border: 1px solid var(--line-dark); border-radius: 4px; background: #fff; cursor: pointer; font-weight: 650; white-space: nowrap; }
    .btn:hover { border-color: #7d8589; background: #fafafa; }
    .btn:disabled { opacity: .46; cursor: not-allowed; }
    .btn.primary { color: #fff; border-color: var(--red); background: var(--red); }
    .btn.primary:hover { background: #a73b34; }
    .btn.green { color: #fff; border-color: var(--green); background: var(--green); }
    .btn.danger { color: var(--red); border-color: #d8aaa5; }
    .btn.icon-only { width: 34px; padding: 0; }
    .btn.block { width: 100%; }
    .text-btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px; border: 0; background: transparent; color: var(--muted); cursor: pointer; }
    .text-btn:hover { color: var(--text); }
    .pill, .status { display: inline-flex; align-items: center; gap: 4px; max-width: 100%; padding: 2px 8px; border-radius: 999px; background: var(--surface-2); color: #596168; font-size: 12px; white-space: nowrap; }
    .pill.demo, .status.pending { color: #806213; background: var(--yellow-soft); }
    .status.confirmed { color: var(--green); background: var(--green-soft); }
    .status.known { color: #355d69; background: var(--blue-soft); }
    .status.unknown { color: #6b7073; background: #eceeed; }
    .status.edited { color: var(--blue); background: var(--blue-soft); }
    .status.rejected { color: var(--red); background: var(--red-soft); }
    .status.processing { color: var(--blue); background: var(--blue-soft); }
    .divider { height: 1px; margin: 12px 0; background: var(--line); }
    .row { display: flex; align-items: center; gap: 8px; }
    .row.wrap { flex-wrap: wrap; }
    .row.between { justify-content: space-between; }
    .grow { flex: 1; min-width: 0; }
    .stack { display: grid; gap: 10px; }
    .empty { padding: 28px 14px; text-align: center; color: var(--muted); border: 1px dashed var(--line-dark); border-radius: 5px; }
    .content-list, .session-list { display: grid; gap: 7px; margin-top: 11px; }
    .object-switcher { width: min(1500px,100%); margin: 0 auto 12px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; background: #fff; border: 1px solid var(--line); border-radius: 6px; }
    .segmented { display: inline-flex; padding: 2px; border: 1px solid var(--line-dark); border-radius: 5px; background: var(--surface-2); }
    .segment { min-height: 34px; padding: 6px 13px; border: 0; border-radius: 3px; background: transparent; color: var(--muted); cursor: pointer; font-weight: 700; }
    .segment.active { background: var(--text); color: #fff; }
    .object-select { min-width: 210px; min-height: 38px; padding: 7px 30px 7px 10px; border: 1px solid var(--line-dark); border-radius: 4px; background: #fff; }
    .series-group { border: 1px solid var(--line); border-radius: 5px; overflow: hidden; background: #fff; }
    .series-node { width: 100%; display: flex; align-items: center; gap: 8px; padding: 9px; border: 0; background: #fff; text-align: left; cursor: pointer; }
    .series-node.active { color: var(--red); background: var(--red-soft); box-shadow: inset 3px 0 var(--red); }
    .series-node strong { flex: 1; }
    .video-children { padding: 0 6px 7px 20px; display: grid; gap: 4px; }
    .video-node { width: 100%; display: grid; grid-template-columns: 33px minmax(0,1fr); gap: 7px; align-items: center; padding: 6px; border: 1px solid transparent; border-radius: 4px; background: var(--surface-2); text-align: left; cursor: pointer; }
    .video-node.active { border-color: var(--red); background: #fff; }
    .video-thumb { width: 33px; height: 40px; display: grid; place-items: center; background: #dce3e3; color: #4e595d; font-size: 10px; font-weight: 750; }
    .series-hero { position: relative; min-height: 190px; overflow: hidden; padding: 22px; display: grid; grid-template-columns: 118px 1fr; gap: 18px; align-items: center; background: #dfe4e3; border-bottom: 1px solid var(--line); }
    .series-poster { height: 150px; display: grid; place-items: end center; padding: 12px; border: 5px solid #fff; background: #b95b54; color: #fff; font-weight: 800; text-align: center; box-shadow: 0 5px 14px rgba(37,41,45,.15); }
    .series-poster.green { background: #4d7467; }
    .series-copy h2 { margin-bottom: 6px; font-size: 23px; }
    .series-copy p { max-width: 680px; margin-bottom: 11px; }
    .meta-pairs { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 9px; }
    .meta-pair { padding: 3px 7px; border: 1px solid var(--line); border-radius: 3px; background: #fafafa; color: var(--muted); font-size: 12px; }
    .meta-pair b { color: var(--text); font-weight: 650; }
    .analysis-summary { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 10px; }
    .summary-stat { padding: 10px; border-top: 3px solid var(--red); background: var(--surface-2); }
    .summary-stat.green { border-top-color: var(--green); }
    .summary-stat.yellow { border-top-color: var(--yellow); }
    .summary-stat strong { display: block; margin-top: 3px; font-size: 18px; }
    .mechanism-flow { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 11px; }
    .mechanism-step { position: relative; padding: 10px; border: 1px solid var(--line); background: #fff; }
    .mechanism-step:not(:last-child):after { content: "⌄"; position: absolute; right: 50%; bottom: -15px; z-index: 2; transform: translateX(50%); color: var(--red); font-size: 20px; font-weight: 800; }
    .content-item, .session-item { width: 100%; display: grid; grid-template-columns: 42px minmax(0,1fr); gap: 9px; padding: 9px; border: 1px solid transparent; border-radius: 5px; background: var(--surface-2); text-align: left; cursor: pointer; }
    .content-item:hover, .session-item:hover { border-color: var(--line-dark); }
    .content-item.active, .session-item.active { border-color: var(--red); background: #fff; box-shadow: inset 3px 0 var(--red); }
    .poster-mini { width: 42px; height: 54px; display: grid; place-items: end center; padding: 4px; overflow: hidden; border: 1px solid #c8cecc; background: #dfe5e5; color: #465158; font-size: 9px; font-weight: 700; }
    .poster-mini.red { background: #ecd5d2; }
    .poster-mini.green { background: #dce7dd; }
    .item-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 700; }
    .item-meta { margin-top: 3px; display: flex; align-items: center; gap: 5px; color: var(--muted); font-size: 12px; }
    .preview { position: relative; min-height: 235px; overflow: hidden; background: #d8dedf; border-bottom: 1px solid var(--line); }
    .scene { position: absolute; inset: 0; overflow: hidden; }
    .scene-wall { position: absolute; inset: 0 0 34%; background: #cfd7d8; }
    .scene-table { position: absolute; left: 15%; right: 8%; bottom: 14%; height: 20%; border-top: 8px solid #6a7478; background: #a5aeae; transform: skewX(-7deg); }
    .scene-screen { position: absolute; top: 14%; right: 13%; width: 30%; height: 37%; border: 8px solid #343b3e; background: #c84c44; }
    .person { position: absolute; bottom: 20%; width: 82px; height: 125px; border-radius: 42px 42px 9px 9px; background: #8a5551; }
    .person:before { content: ""; position: absolute; top: -40px; left: 17px; width: 48px; height: 48px; border-radius: 50%; background: #bc8a74; }
    .person.one { left: 18%; }
    .person.two { left: 45%; height: 116px; background: #56666d; }
    .person.two:before { background: #9a7c6f; }
    .caption { position: absolute; left: 14%; right: 14%; bottom: 14px; padding: 7px 12px; color: #fff; background: rgba(37,41,45,.88); text-align: center; font-weight: 650; }
    .play { position: absolute; inset: 0; display: grid; place-items: center; }
    .play button { width: 48px; height: 48px; border: 1px solid rgba(255,255,255,.8); border-radius: 50%; background: rgba(37,41,45,.75); color: #fff; cursor: pointer; }
    .preview-info { position: absolute; left: 12px; top: 12px; display: flex; gap: 6px; }
    .pipeline { display: grid; grid-template-columns: repeat(4,1fr); padding: 10px 13px; background: #fafafa; border-bottom: 1px solid var(--line); }
    .pipe-step { position: relative; padding: 0 8px 0 22px; color: var(--muted); font-size: 12px; }
    .pipe-step:before { content: ""; position: absolute; left: 2px; top: 3px; width: 11px; height: 11px; border: 2px solid var(--line-dark); border-radius: 50%; background: #fff; }
    .pipe-step:not(:last-child):after { content: ""; position: absolute; left: 14px; right: -2px; top: 9px; height: 1px; background: var(--line-dark); }
    .pipe-step.done { color: var(--green); font-weight: 650; }
    .pipe-step.done:before { border-color: var(--green); background: var(--green); }
    .analysis-tabs { display: flex; gap: 2px; padding: 8px 10px 0; overflow-x: auto; border-bottom: 1px solid var(--line); }
    .analysis-tab { min-height: 38px; padding: 7px 10px; border: 0; border-bottom: 3px solid transparent; background: transparent; color: var(--muted); cursor: pointer; white-space: nowrap; font-weight: 650; }
    .analysis-tab.active { color: var(--red); border-bottom-color: var(--red); }
    .analysis-area { padding: 13px; }
    .all-metadata { display: grid; gap: 14px; background: #f7f7f4; }
    .metadata-section { border: 1px solid var(--line); border-radius: 5px; overflow: hidden; background: #fff; }
    .metadata-section summary { list-style: none; cursor: pointer; }
    .metadata-section summary::-webkit-details-marker { display: none; }
    .metadata-section-head { min-height: 52px; display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-left: 4px solid var(--red); background: var(--surface-2); }
    .metadata-section-head:after { content: "收起"; margin-left: auto; color: var(--muted); font-size: 12px; }
    .metadata-section:not([open]) .metadata-section-head:after { content: "展开"; }
    .section-index { width: 28px; height: 28px; display: grid; place-items: center; border-radius: 50%; background: var(--text); color: #fff; font-weight: 750; }
    .section-title { min-width: 120px; font-size: 16px; font-weight: 750; }
    .section-stats { display: flex; flex-wrap: wrap; gap: 5px; }
    .metadata-table { overflow-x: auto; }
    .metadata-table-head, .metadata-row { min-width: 765px; display: grid; grid-template-columns: 132px minmax(230px,1fr) 112px minmax(145px,.72fr) 132px; gap: 0; align-items: stretch; }
    .metadata-table-head { min-height: 34px; align-items: center; color: var(--muted); background: #fafafa; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); font-size: 12px; font-weight: 650; }
    .metadata-table-head > div, .metadata-cell { padding: 8px 9px; border-right: 1px solid #e7e9e8; }
    .metadata-table-head > div:last-child, .metadata-cell:last-child { border-right: 0; }
    .metadata-row { min-height: 72px; border-bottom: 1px solid var(--line); cursor: pointer; }
    .metadata-row:last-child { border-bottom: 0; }
    .metadata-row:hover { background: #fafafa; }
    .metadata-row.active { background: #fff8f7; box-shadow: inset 3px 0 var(--red); }
    .field-name { font-weight: 750; }
    .field-value { color: #41494f; }
    .field-evidence { color: var(--muted); font-size: 12px; }
    .field-evidence strong { display: block; color: var(--text); }
    .field-state { display: grid; align-content: start; justify-items: start; gap: 5px; }
    .field-actions { display: flex; align-items: flex-start; gap: 4px; }
    .field-actions button { width: 29px; height: 29px; display: grid; place-items: center; padding: 0; border: 1px solid var(--line); border-radius: 4px; background: #fff; cursor: pointer; }
    .field-actions button:hover { color: var(--red); border-color: var(--red); }
    .field-actions .icon { width: 15px; height: 15px; }
    .section-review-btn { display: inline-flex; align-items: center; gap: 4px; margin-left: 3px; min-height: 30px; padding: 4px 8px; border: 1px solid #a9cbbd; border-radius: 4px; background: #fff; color: var(--green); cursor: pointer; font-weight: 700; }
    .section-review-btn .icon { width: 14px; height: 14px; }
    .section-review-btn:hover { background: var(--green-soft); }
    .section-review-btn:disabled { opacity: .45; cursor: not-allowed; }
    .character-zone, .audience-zone, .knowledge-zone { padding: 12px; border-top: 1px solid var(--line); }
    .zone-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 9px; }
    .character-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 8px; }
    .character-card { padding: 11px; border: 1px solid var(--line); border-radius: 5px; background: #fff; }
    .character-card.active { border-color: var(--red); box-shadow: inset 3px 0 var(--red); }
    .character-name { font-size: 16px; font-weight: 760; }
    .character-fields { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 7px; margin-top: 10px; }
    .character-field { padding: 7px; background: var(--surface-2); }
    .character-field span { display: block; margin-bottom: 2px; color: var(--muted); font-size: 11px; }
    .card-actions { display: flex; gap: 4px; }
    .card-actions button { width: 29px; height: 29px; display: grid; place-items: center; padding: 0; border: 1px solid var(--line); border-radius: 4px; background: #fff; cursor: pointer; }
    .card-actions button:hover { color: var(--red); border-color: var(--red); }
    .card-actions .icon { width: 15px; height: 15px; }
    .relationship-panel { margin-top: 10px; padding: 10px; border: 1px solid var(--line); border-radius: 5px; background: #f7f8f7; }
    .relationship-panel.active, .platform-card.active, .knowledge-card.active, .knowledge-asset.active { border-color: var(--red); box-shadow: inset 3px 0 var(--red); }
    .relationship-graph { width: 100%; height: 230px; display: block; }
    .relationship-graph line { stroke: #9aa3a2; stroke-width: 2; }
    .relationship-graph .edge-label { fill: #5d666b; font-size: 11px; }
    .relationship-graph circle { fill: #fff; stroke: var(--red); stroke-width: 3; }
    .relationship-graph .ally { stroke: var(--green); }
    .relationship-graph text.node-label { fill: var(--text); font-size: 13px; font-weight: 750; text-anchor: middle; }
    .world-fields { margin-top: 10px; }
    .platform-grid { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 8px; }
    .platform-card { padding: 11px; border: 1px solid var(--line); border-top: 3px solid var(--red); border-radius: 5px; background: #fff; }
    .platform-card:nth-child(2) { border-top-color: var(--text); }
    .platform-card:nth-child(3) { border-top-color: var(--green); }
    .platform-metrics { display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; margin: 9px 0; }
    .platform-metric { padding: 6px; background: var(--surface-2); text-align: center; }
    .platform-metric strong { display: block; font-size: 16px; }
    .emotion-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .knowledge-flow { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .knowledge-card { position: relative; min-height: 150px; padding: 12px; border: 1px solid var(--line); border-top: 4px solid var(--red); border-radius: 5px; background: #fff; }
    .knowledge-card:nth-child(2) { border-top-color: var(--yellow); }
    .knowledge-card:nth-child(3) { border-top-color: var(--green); }
    .knowledge-card:not(:last-child):after { content: "›"; position: absolute; z-index: 2; right: -8px; top: 45%; color: var(--red); font-size: 22px; font-weight: 800; }
    .knowledge-assets { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 8px; margin-top: 10px; }
    .knowledge-asset { padding: 10px; border: 1px solid var(--line); border-radius: 5px; background: #fff; }
    .dashboard-body { display: grid; gap: 12px; }
    .curve-card { padding: 10px; border: 1px solid var(--line); background: #fff; cursor: pointer; }
    .curve-card:hover { border-color: var(--red); }
    .emotion-curve { width: 100%; height: 180px; display: block; }
    .curve-grid { stroke: #e1e4e2; stroke-width: 1; }
    .curve-line { fill: none; stroke: var(--red); stroke-width: 3; }
    .curve-point { fill: #fff; stroke: var(--red); stroke-width: 2; }
    .curve-label { fill: var(--muted); font-size: 10px; }
    .audit-metrics { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
    .audit-metric { padding: 9px 6px; border: 1px solid var(--line); border-top: 3px solid var(--red); background: #fff; color: var(--text); font: inherit; text-align: center; cursor: pointer; }
    .audit-metric:nth-child(2) { border-top-color: var(--yellow); }
    .audit-metric:nth-child(3) { border-top-color: var(--green); }
    .audit-metric strong { display: block; font-size: 20px; }
    .module-progress-list { display: grid; gap: 6px; }
    .module-progress { width: 100%; padding: 8px; border: 1px solid var(--line); border-radius: 4px; background: #fff; text-align: left; cursor: pointer; }
    .module-progress:hover { border-color: var(--red); }
    .module-progress .signal-bar { margin-top: 6px; }
    .metadata-section { scroll-margin-top: calc(var(--top) + var(--tabs) + 12px); }
    .faction-list { display: grid; gap: 8px; margin-top: 10px; }
    .faction-strip { display: grid; grid-template-columns: minmax(150px,.55fr) minmax(0,1.8fr) auto; gap: 12px; align-items: center; padding: 11px; border: 1px solid var(--line); border-left: 3px solid var(--yellow); border-radius: 5px; background: var(--surface); }
    .faction-strip.active { border-color: var(--red); border-left-color: var(--red); }
    .faction-title { font-size: 15px; font-weight: 760; }
    .faction-fields { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 7px; }
    .faction-field { min-height: 54px; padding: 7px; background: var(--surface-2); }
    .faction-field span { display: block; margin-bottom: 2px; color: var(--muted); font-size: 11px; }
    .knowledge-list { display: grid; gap: 7px; }
    .knowledge-strip { display: grid; grid-template-columns: 76px minmax(170px,.62fr) minmax(240px,1.3fr) minmax(160px,.65fr) auto; gap: 10px; align-items: center; padding: 10px; border: 1px solid var(--line); border-left: 3px solid var(--red); border-radius: 5px; background: var(--surface); }
    .knowledge-strip:nth-child(3n+2) { border-left-color: var(--yellow); }
    .knowledge-strip:nth-child(3n) { border-left-color: var(--green); }
    .knowledge-strip.active { border-color: var(--red); }
    .knowledge-kind { color: var(--muted); font-size: 12px; font-weight: 750; }
    .knowledge-copy p { margin: 3px 0 0; color: var(--muted); }
    .knowledge-evidence { color: var(--muted); font-size: 12px; }
    .knowledge-evidence strong { display: block; color: var(--text); }
    .storyboard-wrap { margin-top: 12px; border-top: 1px solid var(--line); }
    .storyboard-head { padding: 11px 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .storyboard-scroll { overflow-x: auto; }
    .storyboard-table { width: 100%; min-width: 1060px; border-collapse: collapse; }

    function getSeries(){ return state.creative.series.find(x=>x.id===state.creative.selectedSeries) || state.creative.series[0]; }

    function getAnalyses(){
      if(state.creative.scope==='series'){
        const series=getSeries();
        if(!state.creative.seriesAnalyses[series.id]?.length) state.creative.seriesAnalyses[series.id]=buildSeriesFields(series);
        return state.creative.seriesAnalyses[series.id];
      }
      const content=getContent();
      if(!state.creative.analyses[content.id]?.length) state.creative.analyses[content.id]=buildVideoFields(content);
      return state.creative.analyses[content.id];
    }
    function getAnalysis(id=state.ui.selectedAnalysis){ return getAnalyses().find(x => x.id === id); }
    function getSession(){ return state.topics.sessions.find(x => x.id === state.topics.selectedSession) || state.topics.sessions.find(x => !x.archived); }
    function activeSessions(){ return state.topics.sessions.filter(x => !x.archived); }

      clearTimeout(toastTimer);
      const root = document.getElementById('toast-root');

      toastTimer = setTimeout(() => root.innerHTML='', 2600);

    }
    function openDiscussion(){
      const item=getAnalysis(); if(!item)return;
      const history=item.discussion||[];
      setModal(modalShell('与 AI 讨论这条结论',`<div class="discussion">${history.length?history.map(x=>`<div class="discussion-entry ${x.role==='ai'?'ai':''}"><strong>${x.role==='ai'?'AI':'我'}</strong><div>${esc(x.text)}</div></div>`).join(''):`<div class="discussion-entry ai"><strong>AI</strong><div>当前结论置信度为 ${item.confidence}%。你可以要求我解释依据、寻找反例，或收窄适用条件。</div></div>`}</div><div class="field"><label for="discussion-input">继续讨论</label><textarea id="discussion-input" placeholder="例如：这个结论对家庭题材也成立吗？"></textarea></div>`,`<button class="btn" data-action="close-modal">关闭</button><button class="btn primary" data-action="send-review-discussion">${icon('send')}发送</button>`)); hydrateIcons(document.getElementById('modal-root'));
    }
    function openProfileEdit(){
      const s=getSession(),p=s.profile;
      const field=(id,label,val,area=true)=>`<div class="field"><label for="${id}">${label}</label>${area?`<textarea id="${id}">${esc(val)}</textarea>`:`<input id="${id}" value="${esc(val)}">`}</div>`;
      setModal(modalShell('编辑选题侧写',`<div class="stack">${field('p-theme','时代母题',p.theme,false)}${field('p-emotion','主情绪',p.emotion,false)}${field('p-audience','核心人群',p.audience)}${field('p-logline','一句话故事',p.logline)}${field('p-protagonist','主角与抓人特征',p.protagonist)}${field('p-conflict','核心欲望与对抗',p.conflict)}${field('p-difference','差异化表达',p.difference)}${field('p-hooks','前三集钩子（每行一条）',p.hooks.join('\n'))}${field('p-risk','风险与待决问题',p.risk)}</div>`,`<button class="btn" data-action="close-modal">取消</button><button class="btn primary" data-action="save-profile">${icon('check')}保存侧写</button>`)); hydrateIcons(document.getElementById('modal-root'));
    }
    function showReferences(){
      const items=referenceItems(getSession());
      setModal(modalShell('本选题引用的创意知识',items.map(x=>`<article class="ref-item" style="margin-bottom:8px"><div class="row between"><strong>${esc(x.title)}</strong><span class="status ${x.status}">${statusLabel(x.status)}</span></div><p style="margin:7px 0">${esc(x.summary)}</p><div class="evidence">${esc(x.evidence)}</div></article>`).join('')||'<div class="empty">尚未引用创意知识</div>',`<button class="btn" data-action="close-modal">关闭</button>`)); hydrateIcons(document.getElementById('modal-root'));
    }
    function showDataNote(){
      setModal(modalShell('数据说明',`<div class="stack"><p>本页面用于讨论产品结构与交互。剧集、人物、AI 拆解和选题内容均为虚构演示数据。</p><div class="evidence"><strong>平台数据原则</strong><div>尚未接入真实评论、弹幕与行为数据，因此不展示反馈量、增长率、共鸣度等量化指标，也不生成代表评论和群体结论。</div></div><div class="evidence"><strong>当前不包含</strong><div>真实上传、视频理解、评论采集、模型调用、云端数据库与多人协作。</div></div><p class="subtle">情绪曲线和分镜表用于演示 AI 定性分析形态，不代表真实平台表现。浏览器只在本机保存演示操作，可随时重置。</p></div>`,`<button class="btn" data-action="close-modal">知道了</button>`)); hydrateIcons(document.getElementById('modal-root'));
    }
    function showPreview(){ toast('正在播放 12 秒演示片段（模拟）'); }

    function simulateUpload(){
      const video=document.getElementById('upload-video');
      if(!video || !video.files.length){ toast('请先选择一个视频文件','error'); return; }
      const name=video.files[0].name, genre=document.getElementById('upload-genre').value;
      const id=uid('c');
      const series=getSeries(), episode=state.creative.contents.filter(x=>x.seriesId===series.id).length+1;
      const item={id,seriesId:series.id,episode,title:name.replace(/\.[^.]+$/,''),source:'本地导入',genre,duration:'待识别',status:'processing',progress:12,tone:series.tone,goal:'识别本集核心目标',change:'识别人物状态变化',focus:'待完成视频拆解'};
      state.creative.contents.unshift(item); series.videos.push(id); state.creative.analyses[id]=[]; state.creative.scope='video'; state.ui.analysisTab='responsibility'; state.ui.selectedContent=id; state.ui.selectedAnalysis='';
      setModal(''); render(); toast('已开始模拟解析');
      [35,68,100].forEach((progress,index)=>setTimeout(()=>{
        const item=state.creative.contents.find(x=>x.id===id); if(!item)return;
        item.progress=progress;
        if(progress===100){ item.status='review'; item.duration='92 秒'; item.title += '｜演示解析'; item.goal='主角在公开冲突中争取一次关键解释机会'; item.change='从观望转为主动承担选择后果'; item.focus='结果前置、关系阻碍与集尾新问题'; state.creative.analyses[id]=buildVideoFields(item).map(x=>({...x,status:'ai'})); state.ui.selectedAnalysis=state.creative.analyses[id][0].id; }
        render(); if(progress===100) toast('模拟解析完成，已进入人工审核');
      },(index+1)*700));
    }
    function addChat(text){
      const s=getSession(); if(!s || !text.trim()) return;
      s.messages.push({role:'user',text:text.trim()}); s.typing=true; s.updated=`今天 ${nowLabel()}`; render();
      setTimeout(()=>{
        const current=state.topics.sessions.find(x=>x.id===s.id); if(!current)return;
        current.typing=false;
        const response=mockReply(text,current);
        current.messages.push({role:'ai',text:response.text,citation:response.citation});
        current.status='converging'; current.updated=`今天 ${nowLabel()}`;
        applyProfileUpdate(text,current); render();
      },650);
    }
    function mockReply(text,s){
      if(/代价|现实/.test(text)) return {text:'建议把代价拆成三层：立即失去稳定收入、短期失去行业信用、长期必须对新团队负责。这样胜利不是一次打脸，而是主角愿意为新选择承担后果。你需要决定第一层代价在第几集真正发生。',citation:'引用：中年重启需要现实代价、反派不能降智'};
      if(/钩子|前三集/.test(text)) return {text:'前三集可以形成递进：先看到被盗用的结果，再发现公开证据会触发违约，最后让唯一愿意合作的客户与原公司绑定。每集的新问题都来自上一集的选择，避免靠新增意外硬续。',citation:'引用：先给结果再追问原因、集尾问题来自本集后果'};
      if(/同质|风险/.test(text)) return {text:'当前最大的同质化风险是“职场打脸 + 姐姐组队”。差异化应落在专业行动：她如何用剪辑、证据链和内容判断改变局势。建议减少喊口号，把能力写成可见决策。',citation:'引用：价值台词必须由行动兑现'};
      if(/一句话|收敛/.test(text)) return {text:`可收敛为：${s.profile.logline} 现在仍需删掉一个概念，优先保留“夺回署名”，把“对抗 AI”降为背景。`,citation:'引用：高共鸣来自表达权，而非代际对抗'};
      return {text:'我理解你的判断。基于已确认的创意知识，我会优先检查三件事：冲突是否来自人物选择、情绪峰值是否由行动兑现、集尾问题是否是本集后果。你希望先改人物、冲突，还是前三集钩子？',citation:'引用：3 条已确认创意知识'};
    }
    function applyProfileUpdate(text,s){
      if(/代价|现实/.test(text)){ s.profile.conflict='她要用专业证据夺回署名，同时立即失去稳定收入、行业信用，并承担新团队失败的责任。'; s.profile.risk='必须具体表现经济压力；不能让反派因低级失误落败。'; }
      if(/同质|风险/.test(text)) s.profile.difference='不靠年龄对立或口号取胜，用剪辑判断、证据链和团队交付呈现主角的专业能力。';
      if(/一句话|收敛/.test(text)) s.profile.logline=s.profile.logline.replace('被 AI 工具和年轻团队双重替代后，','被公司抹去作品署名后，');
    }
    function jumpToSection(category,selector=''){
      requestAnimationFrame(()=>{
        const section=document.getElementById(`metadata-${category}`); if(!section)return;
        section.open=true;
        const target=selector?section.querySelector(selector):section;
        (target||section).scrollIntoView({behavior:'smooth',block:'start'});
      });
    }

    function dispatch(action,el){
      if(action==='switch-page'){ state.ui.page=el.dataset.page; render(); return; }
      if(action==='show-data-note'){ showDataNote(); return; }
      if(action==='reset'){ if(confirm('恢复初始样例数据？当前演示操作将被清除。')){ state=clone(defaultState); setModal(''); render(); toast('已恢复初始样例数据'); } return; }
      if(action==='close-modal'){ setModal(''); return; }
      if(action==='backdrop-close' && el.classList.contains('modal-backdrop')){ setModal(''); return; }
      if(action==='open-upload'){ openUpload(); return; }
      if(action==='start-upload'){ simulateUpload(); return; }
      if(action==='novel-placeholder'){ toast('小说分析暂未开放，当前仅保留类型入口'); return; }
      if(action==='switch-scope'){ state.creative.scope=el.dataset.scope; state.ui.analysisTab=el.dataset.scope==='series'?'positioning':'responsibility'; const list=getAnalyses(); state.ui.selectedAnalysis=(list.find(x=>x.category===state.ui.analysisTab)||list[0]||{}).id||''; render(); return; }
      if(action==='select-series'){ state.creative.selectedSeries=el.dataset.id; const first=state.creative.contents.find(x=>x.seriesId===el.dataset.id); if(first)state.ui.selectedContent=first.id; state.creative.scope='series'; state.ui.analysisTab='positioning'; const list=getAnalyses(); state.ui.selectedAnalysis=(list[0]||{}).id||''; render(); return; }
      if(action==='select-video'){ const video=state.creative.contents.find(x=>x.id===el.dataset.id); if(!video)return; state.ui.selectedContent=video.id; state.creative.selectedSeries=video.seriesId; state.creative.scope='video'; state.ui.analysisTab='responsibility'; const list=getAnalyses(); state.ui.selectedAnalysis=(list[0]||{}).id||''; render(); return; }
      if(action==='analysis-tab'){ state.ui.analysisTab=el.dataset.tab; const list=getAnalyses().filter(x=>x.category===el.dataset.tab); if(list.length)state.ui.selectedAnalysis=list[0].id; render(); return; }
      if(action==='select-analysis'){ state.ui.selectedAnalysis=el.dataset.id; render(); return; }
      if(action==='play-preview'){ showPreview(); return; }
      if(action==='confirm-section'){
        const category=el.dataset.category;
        const items=visibleSectionItems(category,getAnalyses().filter(x=>x.category===category));
        const pending=items.filter(x=>x.status==='ai');
        pending.forEach(x=>x.status='confirmed');
        if(pending[0])state.ui.selectedAnalysis=pending[0].id;
        render(); jumpToSection(category); toast(pending.length?`已人工确认本模块 ${pending.length} 项 AI 解析结果`:'本模块没有待审核字段'); return;
      }
      if(action==='jump-section'){ jumpToSection(el.dataset.category); return; }
      if(action==='jump-status'){
        const status=el.dataset.status,items=renderedAnalysisItems();
        const match=items.find(x=>status==='unknown'?x.status==='unknown':status==='reviewed'?(x.status==='confirmed'||x.status==='edited'):x.status==='ai') || (status==='parsed'?items.find(x=>x.status!=='unknown'):null);
        if(!match){toast('当前对象没有该状态的元数据','error');return;}
        state.ui.selectedAnalysis=match.id; render(); jumpToSection(match.category,`[data-id="${match.id}"]`); return;
      }
      if(action==='review-confirm'){ const x=getAnalysis(el.dataset.id||state.ui.selectedAnalysis); if(x){state.ui.selectedAnalysis=x.id;x.status='confirmed'; render(); toast('该字段已人工确认');} return; }
      if(action==='review-reject'){ const x=getAnalysis(el.dataset.id||state.ui.selectedAnalysis); if(x){state.ui.selectedAnalysis=x.id;x.status='rejected'; render(); toast('该字段已驳回');} return; }
      if(action==='review-edit'){ if(el.dataset.id)state.ui.selectedAnalysis=el.dataset.id; openReviewEdit(); return; }
      if(action==='save-review-edit'){
        const x=getAnalysis(); if(!x)return; x.title=document.getElementById('edit-title').value.trim(); x.summary=document.getElementById('edit-summary').value.trim(); x.applicability=document.getElementById('edit-applicability').value.trim(); x.boundary=document.getElementById('edit-boundary').value.trim(); x.status='edited'; setModal(''); render(); toast('人工修改已保存并确认'); return;
      }
      if(action==='save-character-edit'){
        const x=getAnalysis(); if(!x||x.entityType!=='character')return;
        const previousName=x.title, nextName=document.getElementById('char-name').value.trim();
        x.title=nextName;
        Object.assign(x.details,{role:document.getElementById('char-role').value.trim(),faction:document.getElementById('char-faction').value.trim(),arc:document.getElementById('char-arc').value.trim(),surface:document.getElementById('char-surface').value.trim(),deep:document.getElementById('char-deep').value.trim(),contrast:document.getElementById('char-contrast').value.trim(),weakness:document.getElementById('char-weakness').value.trim(),visual:document.getElementById('char-visual').value.trim()});
        const relationship=getAnalyses().find(item=>item.entityType==='relationship');
        if(relationship && previousName!==nextName) relationship.details.edges.forEach(edge=>{if(edge.from===previousName)edge.from=nextName;if(edge.to===previousName)edge.to=nextName;});
        x.summary=`${x.details.role}｜${x.details.surface}`; x.status='edited'; setModal(''); render(); jumpToSection('world',`[data-id="${x.id}"]`); toast('角色档案已更新并确认'); return;
      }
      if(action==='save-relationship-edit'){
        const x=getAnalysis(),input=document.getElementById('relation-edges'); if(!x||x.entityType!=='relationship'||!input)return;
        const edges=input.value.split('\n').map(line=>line.split(/[|｜]/).map(v=>v.trim())).filter(parts=>parts.length>=3&&parts[0]&&parts[1]&&parts[2]).slice(0,4).map((parts,index)=>({from:parts[0],to:parts[1],label:parts.slice(2).join('｜'),tone:index===1||index===2?'ally':'conflict'}));
        if(!edges.length){toast('至少保留一条有效人物关系','error');return;}
        x.details.edges=edges; x.summary=`已核实 ${edges.length} 条关键人物关系。`; x.status='edited'; setModal(''); render(); jumpToSection('world'); toast('人物关系网已更新并确认'); return;
      }
      if(action==='save-faction-edit'){
        const x=getAnalysis(); if(!x||x.entityType!=='faction')return;
        x.title=document.getElementById('faction-name').value.trim();
        Object.assign(x.details,{position:document.getElementById('faction-position').value.trim(),traits:document.getElementById('faction-traits').value.trim(),goal:document.getElementById('faction-goal').value.trim(),resources:document.getElementById('faction-resources').value.trim(),constraints:document.getElementById('faction-constraints').value.trim()});
        x.summary=`${x.details.position}；目标：${x.details.goal}`; x.status='edited'; setModal(''); render(); jumpToSection('world',`[data-id="${x.id}"]`); toast('阵营档案已更新并确认'); return;
      }
      if(action==='save-platform-edit'){
        const x=getAnalysis(); if(!x||x.entityType!=='platform')return;
        Object.assign(x.details,{source:document.getElementById('platform-source').value.trim(),note:document.getElementById('platform-note').value.trim(),fields:document.getElementById('platform-fields').value.split(/[、,，]/).map(v=>v.trim()).filter(Boolean).slice(0,8)});
        x.summary=document.getElementById('platform-summary').value.trim(); x.status='edited'; setModal(''); render(); jumpToSection('audience',`[data-id="${x.id}"]`); toast('平台洞察已更新并确认'); return;
      }
      if(action==='review-discuss'){ if(el.dataset.id)state.ui.selectedAnalysis=el.dataset.id; openDiscussion(); return; }
      if(action==='send-review-discussion'){
        const input=document.getElementById('discussion-input'),x=getAnalysis(); if(!input.value.trim()){toast('请输入要讨论的问题','error');return;} x.discussion=x.discussion||[]; x.discussion.push({role:'user',text:input.value.trim()},{role:'ai',text:'这条结论的关键不是照搬情节，而是保留因果结构。建议把适用条件收窄为“证据能改变人物关系或权力位置”的场景，并在迁移时重新设计证据来源。'}); openDiscussion(); return;
      }
      if(action==='select-session'){ state.topics.selectedSession=el.dataset.id; render(); return; }
      if(action==='new-session'){
        const id=uid('s'); state.topics.sessions.push({id,title:'新选题方向',status:'exploring',updated:`今天 ${nowLabel()}`,archived:false,confirmed:false,messages:[{role:'ai',text:'先告诉我你想表达的时代情绪、目标观众，或一个你不愿放弃的故事画面。我会结合已确认的创意知识帮助你收敛。',citation:'已连接创意库中的人工确认知识'}],profile:{theme:'待讨论',emotion:'待讨论',audience:'待讨论',logline:'等待通过讨论形成一句话故事。',protagonist:'待讨论',conflict:'待讨论',difference:'待讨论',hooks:['待讨论','待讨论','待讨论'],risk:'需要先明确创作意图。'},references:['c1-knowledge-reuse','s1-audience-signals']}); state.topics.selectedSession=id; render(); toast('已新建选题会话'); return;
      }
      if(action==='cloud-prompt'){
        const input=document.getElementById('chat-input'); if(!input)return; input.value=el.dataset.text||''; input.focus?.(); toast('已带入讨论框'); return;
      }
      if(action==='archive-session'){
        const s=state.topics.sessions.find(x=>x.id===el.dataset.id); if(!s)return; s.archived=!s.archived; if(s.archived && state.topics.selectedSession===s.id){const next=activeSessions()[0]; if(next)state.topics.selectedSession=next.id;} else if(!s.archived)state.topics.selectedSession=s.id; render(); toast(s.archived?'会话已归档':'会话已恢复'); return;
      }
      if(action==='delete-session'){
        if(!confirm('删除这个选题会话？此操作仅影响演示数据。'))return; state.topics.sessions=state.topics.sessions.filter(x=>x.id!==el.dataset.id); const next=activeSessions()[0]||state.topics.sessions[0]; if(next)state.topics.selectedSession=next.id; render(); toast('会话已删除'); return;
      }
      if(action==='quick-prompt'){ addChat(el.dataset.text); return; }
      if(action==='send-chat'){ const input=document.getElementById('chat-input'); addChat(input.value); return; }
      if(action==='edit-profile'){ openProfileEdit(); return; }
      if(action==='save-profile'){
        const s=getSession(),p=s.profile; p.theme=document.getElementById('p-theme').value.trim(); p.emotion=document.getElementById('p-emotion').value.trim(); p.audience=document.getElementById('p-audience').value.trim(); p.logline=document.getElementById('p-logline').value.trim(); p.protagonist=document.getElementById('p-protagonist').value.trim(); p.conflict=document.getElementById('p-conflict').value.trim(); p.difference=document.getElementById('p-difference').value.trim(); p.hooks=document.getElementById('p-hooks').value.split('\n').map(x=>x.trim()).filter(Boolean).slice(0,3); p.risk=document.getElementById('p-risk').value.trim(); s.status='converging'; s.updated=`今天 ${nowLabel()}`; setModal(''); render(); toast('选题侧写已更新'); return;
      }
      if(action==='show-references'){ showReferences(); return; }
      if(action==='confirm-topic'){
        const s=getSession(); if(!s)return; s.confirmed=true; s.status='confirmed'; s.updated=`今天 ${nowLabel()}`; s.messages.push({role:'ai',text:'选题已按当前侧写确认。我已保留本次讨论和引用依据；后续继续修改时，请明确指出要调整的目标。',citation:'已记录当前版本与引用关系'}); render(); toast('选题已确认并生成选题卡'); return;
      }
    }

    document.addEventListener('click',e=>{ const el=e.target.closest('[data-action]'); if(!el)return; e.preventDefault(); e.stopPropagation(); dispatch(el.dataset.action,el); });
    document.addEventListener('change',e=>{
      if(e.target.id==='upload-video'){ const node=document.getElementById('video-name'); if(node) node.textContent=e.target.files[0]?.name||'尚未选择'; }
      if(e.target.id==='series-select'){
        state.creative.selectedSeries=e.target.value;
        const first=state.creative.contents.find(x=>x.seriesId===e.target.value); if(first)state.ui.selectedContent=first.id;
        state.ui.analysisTab=state.creative.scope==='series'?'positioning':'responsibility'; const list=getAnalyses(); state.ui.selectedAnalysis=(list[0]||{}).id||''; render();
      }
      if(e.target.id==='video-select'){
        state.ui.selectedContent=e.target.value; state.creative.scope='video'; state.ui.analysisTab='responsibility'; const list=getAnalyses(); state.ui.selectedAnalysis=(list[0]||{}).id||''; render();
      }
    });
    document.addEventListener('keydown',e=>{
      if(e.key==='Enter' && (e.metaKey||e.ctrlKey) && e.target.id==='chat-input'){ e.preventDefault(); addChat(e.target.value); }
      if(e.key==='Escape') setModal('');
    });
    hydrateIcons(); render();
  })();
  </script>
</body>
</html>
